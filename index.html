<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>論語賽馬遊戲</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以直接編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自訂簡單的動畫 */
        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 自訂 SVG 圖示 (取代原本的 lucide-react) ---
        const TrophyIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const TimerIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
        );
        const PlayIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const RotateCcwIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const StarIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );
        const AlertCircleIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        );

        // --- 題庫資料 (論語與孔子相關) ---
        const QUESTION_BANK = [
            { q: '子曰：「學而時習之，不亦___乎？」', options: ['悅', '樂', '快', '喜'], ans: 0 },
            { q: '孔子的字是什麼？', options: ['孔明', '仲尼', '伯安', '太白'], ans: 1 },
            { q: '「三人行，必有我師焉」出自哪一部經典？', options: ['孟子', '莊子', '論語', '大學'], ans: 2 },
            { q: '孔子的核心思想是？', options: ['仁', '義', '禮', '智'], ans: 0 },
            { q: '子曰：「溫故而知___，可以為師矣。」', options: ['新', '理', '道', '學'], ans: 0 },
            { q: '孔子是春秋末期哪一國人？', options: ['齊國', '楚國', '晉國', '魯國'], ans: 3 },
            { q: '「吾十有五而志於學，三十而___」？', options: ['不惑', '知天命', '立', '耳順'], ans: 2 },
            { q: '孔門四科中，顏淵以何者著稱？', options: ['言語', '政事', '文學', '德行'], ans: 3 },
            { q: '子曰：「己所不欲，勿施於___。」', options: ['人', '物', '心', '天'], ans: 0 },
            { q: '「有朋自遠方來，不亦樂乎？」下一句是？', options: ['人不知而不慍', '學而時習之', '不亦君子乎', '可以為師矣'], ans: 0 },
            { q: '子曰：「知之為知之，不知為不知，是___也。」', options: ['智', '慧', '明', '理'], ans: 0 },
            { q: '孔子整理編訂了六經，下列何者不屬於六經？', options: ['詩', '書', '道德經', '春秋'], ans: 2 },
            { q: '子路問政，子曰：「先之，___之。」', options: ['勞', '教', '養', '治'], ans: 0 },
            { q: '「朝聞道，夕死可矣」表達了孔子對什麼的追求？', options: ['長生', '真理', '財富', '權力'], ans: 1 },
            { q: '孔子提倡的「有教無類」是指什麼？', options: ['只教貴族', '不分貧富貴賤都能受教育', '教導不同的學科', '沒有類別的教育'], ans: 1 },
        ];

        const CPU_NAMES = ['子路', '顏回', '子貢'];
        const WIN_SCORE = 100; // 終點線 100%
        const TIME_LIMIT = 15; // 每題 15 秒

        function App() {
            // 遊戲狀態: 'start', 'playing', 'finished'
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
            
            // 參賽者位置 (0-100)
            const [positions, setPositions] = useState({
                player: 0,
                cpu1: 0,
                cpu2: 0,
                cpu3: 0
            });
            
            // 遊戲統計
            const [correctAnswers, setCorrectAnswers] = useState(0);
            const [rank, setRank] = useState(0);
            const [feedback, setFeedback] = useState(null); // 'correct' | 'wrong' | null

            // 洗牌題庫
            const shuffleQuestions = () => {
                const shuffled = [...QUESTION_BANK].sort(() => 0.5 - Math.random());
                setQuestions(shuffled);
            };

            // 開始遊戲
            const startGame = () => {
                shuffleQuestions();
                setCurrentQIndex(0);
                setPositions({ player: 0, cpu1: 0, cpu2: 0, cpu3: 0 });
                setCorrectAnswers(0);
                setRank(0);
                setTimeLeft(TIME_LIMIT);
                setFeedback(null);
                setGameState('playing');
            };

            // 處理答題
            const handleAnswer = (selectedIndex) => {
                if (gameState !== 'playing' || feedback !== null) return;

                const currentQ = questions[currentQIndex];
                const isCorrect = selectedIndex === currentQ.ans;

                if (isCorrect) {
                setFeedback('correct');
                setCorrectAnswers(prev => prev + 1);
                setPositions(prev => {
                    const newPos = Math.min(prev.player + 20, WIN_SCORE); // 答對一次前進 20%
                    return { ...prev, player: newPos };
                });
                } else {
                setFeedback('wrong');
                }

                // 短暫延遲後進入下一題
                setTimeout(() => {
                setFeedback(null);
                nextQuestion();
                }, 1000);
            };

            // 進入下一題
            const nextQuestion = useCallback(() => {
                setCurrentQIndex(prev => (prev + 1) % questions.length);
                setTimeLeft(TIME_LIMIT);
            }, [questions.length]);

            // 計時器邏輯
            useEffect(() => {
                if (gameState !== 'playing' || feedback !== null) return;

                const timer = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 1) {
                    // 時間到，視為答錯
                    setFeedback('wrong');
                    setTimeout(() => {
                        setFeedback(null);
                        nextQuestion();
                    }, 1000);
                    return TIME_LIMIT;
                    }
                    return prev - 1;
                });
                }, 1000);

                return () => clearInterval(timer);
            }, [gameState, feedback, nextQuestion]);

            // 電腦對手移動邏輯
            useEffect(() => {
                if (gameState !== 'playing') return;

                const moveInterval = setInterval(() => {
                setPositions(prev => {
                    // 隨機移動 0.5% ~ 2.5%
                    const moveCpu = () => Math.random() * 2 + 0.5;
                    
                    const newPositions = {
                    player: prev.player,
                    cpu1: Math.min(prev.cpu1 + moveCpu(), WIN_SCORE),
                    cpu2: Math.min(prev.cpu2 + moveCpu() * 1.1, WIN_SCORE), // 顏回稍微快一點
                    cpu3: Math.min(prev.cpu3 + moveCpu(), WIN_SCORE),
                    };

                    // 檢查是否有人抵達終點
                    if (newPositions.player >= WIN_SCORE || newPositions.cpu1 >= WIN_SCORE || 
                        newPositions.cpu2 >= WIN_SCORE || newPositions.cpu3 >= WIN_SCORE) {
                    
                    // 計算名次
                    const scores = [
                        { id: 'player', score: newPositions.player },
                        { id: 'cpu1', score: newPositions.cpu1 },
                        { id: 'cpu2', score: newPositions.cpu2 },
                        { id: 'cpu3', score: newPositions.cpu3 }
                    ].sort((a, b) => b.score - a.score);
                    
                    const playerRank = scores.findIndex(s => s.id === 'player') + 1;
                    setRank(playerRank);
                    setGameState('finished');
                    }

                    return newPositions;
                });
                }, 500); // 每 0.5 秒更新一次位置

                return () => clearInterval(moveInterval);
            }, [gameState]);


            // --- 畫面渲染 ---

            // 開始畫面
            if (gameState === 'start') {
                return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-slate-100 font-sans p-4">
                    <div className="w-full max-w-md bg-amber-50 rounded-3xl overflow-hidden shadow-2xl border-4 border-amber-800">
                    <div className="bg-amber-800 p-8 text-center rounded-b-3xl shadow-lg">
                        <h1 className="text-4xl font-extrabold text-amber-100 tracking-wider mb-2 drop-shadow-md">論語賽馬</h1>
                        <p className="text-amber-200/80 text-sm">與孔門弟子一較高下</p>
                    </div>
                    
                    <div className="p-8 text-amber-900 flex flex-col items-center">
                        <div className="bg-amber-100 w-full p-6 rounded-xl border-2 border-amber-200 mb-8 relative">
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-amber-600 text-white px-4 py-1 rounded-full text-sm font-bold shadow">
                            遊戲規則
                        </div>
                        <ul className="space-y-4 mt-2 text-sm font-medium">
                            <li className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0">🏃</div>
                            <span>答對問題，你的角色將會前進！</span>
                            </li>
                            <li className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-red-600 shrink-0">⏱️</div>
                            <span>每題有 <strong className="text-red-500">15 秒</strong> 限制，超時視同答錯。</span>
                            </li>
                            <li className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600 shrink-0">🏆</div>
                            <span>最先抵達終點線（最右側）者獲勝！</span>
                            </li>
                        </ul>
                        </div>

                        <button 
                        onClick={startGame}
                        className="w-full bg-gradient-to-b from-amber-400 to-amber-600 hover:from-amber-300 hover:to-amber-500 text-white font-bold py-4 px-8 rounded-2xl shadow-xl transform transition hover:scale-105 active:scale-95 flex items-center justify-center gap-2 text-xl"
                        >
                        <PlayIcon className="fill-current" /> 開始比賽
                        </button>
                    </div>
                    </div>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-slate-100 p-2 sm:p-4">
                <div className="w-full max-w-md bg-sky-900 rounded-3xl overflow-hidden shadow-2xl relative flex flex-col h-[85vh] sm:h-[800px] border border-sky-700">
                    
                    {/* 頂部標題 */}
                    <div className="bg-gradient-to-b from-amber-700 to-amber-900 p-3 flex justify-between items-center z-10 shadow-md">
                    <div className="flex items-center gap-2">
                        <TrophyIcon className="text-amber-400" size={24} />
                        <span className="font-bold text-amber-50 text-lg">論語大賽</span>
                    </div>
                    <div className="bg-amber-950/50 px-3 py-1 rounded-full text-amber-200 font-mono font-bold flex items-center gap-2 border border-amber-800/50">
                        <StarIcon size={16} className="text-yellow-400 fill-current" />
                        答對: {correctAnswers} 題
                    </div>
                    </div>

                    {/* 賽道區域 (仿圖片的海水/跑道風格) */}
                    <div className="flex-1 bg-sky-400/20 flex flex-col p-2 gap-2 relative overflow-hidden">
                    {/* 裝飾背景 */}
                    <div className="absolute inset-0 opacity-10 pointer-events-none" 
                        style={{ backgroundImage: 'radial-gradient(circle at 20px 20px, white 2%, transparent 0)', backgroundSize: '40px 40px' }} />
                    
                    {/* 終點線 */}
                    <div className="absolute right-0 sm:right-4 top-0 bottom-0 w-8 border-l-4 border-dashed border-red-500/50 bg-red-500/10 z-0 flex flex-col justify-center items-center">
                        <span className="rotate-90 font-bold text-red-500/50 tracking-widest text-xl opacity-50">FINISH</span>
                    </div>

                    {[
                        { id: 'player', name: '我 (玩家)', pos: positions.player, avatar: '🎓', color: 'bg-green-500' },
                        { id: 'cpu1', name: CPU_NAMES[0], pos: positions.cpu1, avatar: '🐎', color: 'bg-purple-500' },
                        { id: 'cpu2', name: CPU_NAMES[1], pos: positions.cpu2, avatar: '🐎', color: 'bg-blue-500' },
                        { id: 'cpu3', name: CPU_NAMES[2], pos: positions.cpu3, avatar: '🐎', color: 'bg-orange-500' },
                    ].map((racer, idx) => (
                        <div key={racer.id} className="flex-1 relative flex items-center bg-white/10 rounded-xl border border-white/5 backdrop-blur-sm z-10 px-2 sm:px-4">
                        {/* 跑道線條 */}
                        <div className="absolute left-0 right-0 h-1 bg-white/20 top-1/2 -translate-y-1/2 rounded-full mx-4 sm:mx-8"></div>
                        
                        {/* 終點獎勵箱圖示 (裝飾) */}
                        <div className="absolute right-2 sm:right-4 w-8 h-8 sm:w-10 sm:h-10 bg-amber-500 rounded-lg flex items-center justify-center shadow-lg border-2 border-amber-300 z-0">
                            <span className="text-white font-bold text-xs sm:text-sm">{idx + 1}</span>
                        </div>

                        {/* 角色頭像 */}
                        <div 
                            className="absolute flex flex-col items-center transition-all duration-[500ms] ease-linear z-10"
                            style={{ left: `calc(${racer.pos * 0.8}% + 10px)` }} // 0.8 是為右側保留終點空間
                        >
                            <div className={`w-10 h-10 sm:w-14 sm:h-14 ${racer.color} rounded-full border-2 sm:border-4 border-white shadow-xl flex items-center justify-center text-xl sm:text-2xl transform -translate-y-2`}>
                            {racer.avatar}
                            </div>
                            <div className="bg-slate-900/80 text-white text-[10px] sm:text-xs px-2 py-0.5 rounded-full mt-1 whitespace-nowrap">
                            {racer.name}
                            </div>
                        </div>
                        </div>
                    ))}
                    </div>

                    {/* 下半部：問答區域 */}
                    {gameState === 'playing' && (
                    <div className="h-64 sm:h-72 bg-slate-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.3)] z-20 flex flex-col relative">
                        
                        {/* 時間條 */}
                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-800 rounded-full px-4 py-1 flex items-center gap-2 border-2 border-slate-700 shadow-lg text-white">
                        <TimerIcon size={16} className={timeLeft <= 5 ? 'text-red-400 animate-pulse' : 'text-blue-400'} />
                        <span className={`font-mono font-bold ${timeLeft <= 5 ? 'text-red-400' : 'text-white'}`}>
                            {timeLeft}s
                        </span>
                        </div>
                        
                        <div className="p-4 sm:p-6 flex flex-col h-full mt-2">
                        <div className="flex-1 flex items-center justify-center text-center">
                            <h2 className="text-lg sm:text-xl font-bold text-slate-800 leading-snug">
                            {questions[currentQIndex]?.q}
                            </h2>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-2 sm:gap-3 mt-4">
                            {questions[currentQIndex]?.options.map((opt, idx) => {
                            let btnColor = "bg-white hover:bg-blue-50 border-slate-200 text-slate-700";
                            if (feedback) {
                                if (idx === questions[currentQIndex].ans) {
                                btnColor = "bg-green-100 border-green-500 text-green-700"; // 正確答案
                                } else if (feedback === 'wrong') {
                                btnColor = "bg-red-50 border-red-200 text-red-400 opacity-50"; // 其他答案變淡
                                }
                            }

                            return (
                                <button
                                key={idx}
                                onClick={() => handleAnswer(idx)}
                                disabled={feedback !== null}
                                className={`p-3 sm:p-4 rounded-xl border-2 font-bold transition-all shadow-sm active:scale-95 flex items-center justify-center text-sm sm:text-base ${btnColor}`}
                                >
                                {opt}
                                </button>
                            );
                            })}
                        </div>
                        </div>
                        
                        {/* 進度提示條 */}
                        <div className="h-1 bg-slate-200">
                        <div 
                            className="h-full bg-blue-500 transition-all duration-1000 ease-linear"
                            style={{ width: `${(timeLeft / TIME_LIMIT) * 100}%` }}
                        />
                        </div>
                    </div>
                    )}

                    {/* 結算畫面疊加層 */}
                    {gameState === 'finished' && (
                    <div className="absolute inset-0 bg-slate-900/90 z-50 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                        <div className="bg-amber-50 w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl animate-bounce-in border-4 border-amber-600 relative overflow-hidden">
                        
                        {/* 裝飾線 */}
                        <div className="absolute top-0 left-0 w-full h-32 bg-amber-600 rounded-b-[50%] -translate-y-16"></div>

                        <div className="relative z-10 flex flex-col items-center">
                            {rank === 1 ? (
                            <div className="w-24 h-24 bg-yellow-400 rounded-full flex items-center justify-center border-4 border-yellow-200 shadow-lg mb-4">
                                <TrophyIcon size={48} className="text-yellow-700" />
                            </div>
                            ) : (
                            <div className="w-24 h-24 bg-slate-300 rounded-full flex items-center justify-center border-4 border-slate-100 shadow-lg mb-4">
                                <AlertCircleIcon size={48} className="text-slate-600" />
                            </div>
                            )}
                            
                            <h2 className="text-3xl font-black text-amber-900 mb-1">
                            {rank === 1 ? '金榜題名！' : '再接再厲！'}
                            </h2>
                            <p className="text-amber-700 font-bold text-xl mb-6">
                            最終名次：第 {rank} 名
                            </p>

                            <div className="bg-white w-full rounded-2xl p-4 shadow-inner mb-8 border border-slate-100">
                            <div className="flex justify-between items-center py-2 border-b border-slate-100">
                                <span className="text-slate-500">答對題數</span>
                                <span className="font-bold text-amber-600 text-xl">{correctAnswers} 題</span>
                            </div>
                            <div className="flex justify-between items-center py-2">
                                <span className="text-slate-500">電腦最強對手</span>
                                <span className="font-bold text-slate-700">
                                {rank === 1 ? CPU_NAMES[Math.floor(Math.random() * 3)] : CPU_NAMES[0]}
                                </span>
                            </div>
                            </div>

                            <button 
                            onClick={startGame}
                            className="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 text-lg"
                            >
                            <RotateCcwIcon size={20} />
                            再來一局
                            </button>
                        </div>
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
