<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>論語賽馬遊戲</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 canvas-confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* 自訂背景樣式 */
        .game-bg-image {
            background-image: url('背景.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 自訂 SVG 圖示 ---
        const TrophyIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const TimerIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
        );
        const PlayIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const RotateCcwIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const StarIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );
        const AlertCircleIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        );

        const QUESTION_BANK = [
            { q: '子曰：「學而時習之，不亦___乎？」', options: ['悅', '樂', '快', '喜'], ans: 0 },
            { q: '孔子的字是什麼？', options: ['孔明', '仲尼', '伯安', '太白'], ans: 1 },
            { q: '「三人行，必有我師焉」出自哪一部經典？', options: ['孟子', '莊子', '論語', '大學'], ans: 2 },
            { q: '孔子的核心思想是？', options: ['仁', '義', '禮', '智'], ans: 0 },
            { q: '子曰：「溫故而知___，可以為師矣。」', options: ['新', '理', '道', '學'], ans: 0 },
            { q: '孔子是春秋末期哪一國人？', options: ['齊國', '楚國', '晉國', '魯國'], ans: 3 },
            { q: '「吾十有五而志於學，三十而___」？', options: ['不惑', '知天命', '立', '耳順'], ans: 2 },
            { q: '孔門四科中，顏淵以何者著稱？', options: ['言語', '政事', '文學', '德行'], ans: 3 },
            { q: '子曰：「己所不欲，勿施於___。」', options: ['人', '物', '心', '天'], ans: 0 },
            { q: '「有朋自遠方來，不亦樂乎？」下一句是？', options: ['人不知而不慍', '學而時習之', '不亦君子乎', '可以為師矣'], ans: 0 },
            { q: '子曰：「知之為知之，不知為不知，是___也。」', options: ['智', '慧', '明', '理'], ans: 0 },
            { q: '孔子整理編訂了六經，下列何者不屬於六經？', options: ['詩', '書', '道德經', '春秋'], ans: 2 },
            { q: '子路問政，子曰：「先之，___之。」', options: ['勞', '教', '養', '治'], ans: 0 },
            { q: '「朝聞道，夕死可矣」表達了孔子對什麼的追求？', options: ['長生', '真理', '財富', '權力'], ans: 1 },
            { q: '孔子提倡的「有教無類」是指什麼？', options: ['只教貴族', '不分貧富貴賤都能受教育', '教導不同的學科', '沒有類別的教育'], ans: 1 },
        ];

        const CPU_NAMES = ['子路', '顏回', '子貢'];
        const WIN_SCORE = 100;
        const TIME_LIMIT = 15;

        const AudioHelper = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone(freq, type, duration, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playCorrect() {
                this.playTone(600, 'sine', 0.1);
                setTimeout(() => this.playTone(800, 'sine', 0.15), 100);
            },
            playWrong() {
                this.playTone(250, 'sawtooth', 0.3, 0.15);
            },
            playWin() {
                this.playTone(400, 'sine', 0.1);
                setTimeout(() => this.playTone(500, 'sine', 0.1), 100);
                setTimeout(() => this.playTone(600, 'sine', 0.2), 200);
                setTimeout(() => this.playTone(800, 'sine', 0.4), 300);
            },
            playLose() {
                this.playTone(400, 'sawtooth', 0.2, 0.1);
                setTimeout(() => this.playTone(350, 'sawtooth', 0.2, 0.1), 200);
                setTimeout(() => this.playTone(300, 'sawtooth', 0.4, 0.1), 400);
            }
        };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
            
            const [positions, setPositions] = useState({ player: 0, cpu1: 0, cpu2: 0, cpu3: 0 });
            const [correctAnswers, setCorrectAnswers] = useState(0);
            const [rank, setRank] = useState(0);
            const [feedback, setFeedback] = useState(null);

            const shuffleQuestions = () => {
                const shuffled = [...QUESTION_BANK].sort(() => 0.5 - Math.random());
                setQuestions(shuffled);
            };

            const startGame = () => {
                AudioHelper.init();
                shuffleQuestions();
                setCurrentQIndex(0);
                setPositions({ player: 0, cpu1: 0, cpu2: 0, cpu3: 0 });
                setCorrectAnswers(0);
                setRank(0);
                setTimeLeft(TIME_LIMIT);
                setFeedback(null);
                setGameState('playing');
            };

            const handleAnswer = (selectedIndex) => {
                if (gameState !== 'playing' || feedback !== null) return;

                const currentQ = questions[currentQIndex];
                const isCorrect = selectedIndex === currentQ.ans;

                if (isCorrect) {
                    AudioHelper.playCorrect();
                    setFeedback('correct');
                    setCorrectAnswers(prev => prev + 1);
                    setPositions(prev => {
                        const newPos = Math.min(prev.player + 20, WIN_SCORE);
                        return { ...prev, player: newPos };
                    });
                } else {
                    AudioHelper.playWrong();
                    setFeedback('wrong');
                }

                setTimeout(() => {
                    setFeedback(null);
                    nextQuestion();
                }, 1000);
            };

            const nextQuestion = useCallback(() => {
                setCurrentQIndex(prev => (prev + 1) % questions.length);
                setTimeLeft(TIME_LIMIT);
            }, [questions.length]);

            useEffect(() => {
                if (gameState !== 'playing' || feedback !== null) return;

                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            AudioHelper.playWrong();
                            setFeedback('wrong');
                            setTimeout(() => {
                                setFeedback(null);
                                nextQuestion();
                            }, 1000);
                            return TIME_LIMIT;
                        }
                        return prev - 1;
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, [gameState, feedback, nextQuestion]);

            useEffect(() => {
                if (gameState !== 'playing') return;

                const moveInterval = setInterval(() => {
                    setPositions(prev => {
                        const moveCpu = () => Math.random() * 2 + 0.5;
                        const newPositions = {
                            player: prev.player,
                            cpu1: Math.min(prev.cpu1 + moveCpu(), WIN_SCORE),
                            cpu2: Math.min(prev.cpu2 + moveCpu() * 1.1, WIN_SCORE),
                            cpu3: Math.min(prev.cpu3 + moveCpu(), WIN_SCORE),
                        };

                        if (newPositions.player >= WIN_SCORE || newPositions.cpu1 >= WIN_SCORE || 
                            newPositions.cpu2 >= WIN_SCORE || newPositions.cpu3 >= WIN_SCORE) {
                            
                            const scores = [
                                { id: 'player', score: newPositions.player },
                                { id: 'cpu1', score: newPositions.cpu1 },
                                { id: 'cpu2', score: newPositions.cpu2 },
                                { id: 'cpu3', score: newPositions.cpu3 }
                            ].sort((a, b) => b.score - a.score);
                            
                            const playerRank = scores.findIndex(s => s.id === 'player') + 1;
                            setRank(playerRank);
                            setGameState('finished');
                        }

                        return newPositions;
                    });
                }, 500);

                return () => clearInterval(moveInterval);
            }, [gameState]);

            useEffect(() => {
                if (gameState === 'finished') {
                    if (rank === 1) {
                        AudioHelper.playWin();
                        const duration = 3000;
                        const animationEnd = Date.now() + duration;
                        const frame = () => {
                            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fbbf24', '#f59e0b', '#d97706', '#3b82f6', '#ef4444'] });
                            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fbbf24', '#f59e0b', '#d97706', '#3b82f6', '#ef4444'] });
                            if (Date.now() < animationEnd) requestAnimationFrame(frame);
                        };
                        frame();
                    } else {
                        AudioHelper.playLose();
                    }
                }
            }, [gameState, rank]);

            if (gameState === 'start') {
                return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-slate-100 font-sans p-4 game-bg-image">
                    <div className="w-full max-w-2xl bg-amber-50/90 backdrop-blur-md rounded-3xl overflow-hidden shadow-2xl border-4 border-amber-800">
                    <div className="bg-amber-800 p-10 text-center rounded-b-3xl shadow-lg">
                        <h1 className="text-5xl md:text-6xl font-extrabold text-amber-100 tracking-wider mb-4 drop-shadow-md">論語賽馬</h1>
                        <p className="text-amber-200/80 text-lg md:text-xl">與孔門弟子一較高下</p>
                    </div>
                    
                    <div className="p-10 text-amber-900 flex flex-col items-center">
                        <div className="bg-amber-100/80 w-full p-8 rounded-xl border-2 border-amber-200 mb-8 relative text-lg md:text-xl">
                            <div className="absolute -top-5 left-1/2 -translate-x-1/2 bg-amber-600 text-white px-6 py-2 rounded-full font-bold shadow-md">遊戲規則</div>
                            <ul className="space-y-6 mt-4 font-medium">
                                <li className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0 text-2xl">🏃</div>
                                    <span>答對問題，你的角色將會前進！</span>
                                </li>
                                <li className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600 shrink-0 text-2xl">⏱️</div>
                                    <span>每題有 15 秒 限制，超時視同答錯。</span>
                                </li>
                                <li className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600 shrink-0 text-2xl">🏆</div>
                                    <span>最先抵達終點線者獲勝！</span>
                                </li>
                            </ul>
                        </div>
                        <button onClick={startGame} className="w-full max-w-md bg-gradient-to-b from-amber-400 to-amber-600 hover:from-amber-300 hover:to-amber-500 text-white font-bold py-5 px-8 rounded-2xl shadow-xl transform transition hover:scale-105 active:scale-95 flex items-center justify-center gap-3 text-2xl">
                            <PlayIcon className="fill-current" size={32} /> 開始比賽
                        </button>
                    </div>
                    </div>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-slate-100 p-2 sm:p-6 md:p-10 game-bg-image">
                {/* 16:9 賽馬主體外框 */}
                <div className="w-full max-w-6xl aspect-[16/9] min-h-[600px] bg-sky-900/40 backdrop-blur-sm rounded-3xl overflow-hidden shadow-2xl relative flex flex-col border-4 border-sky-700/50">
                    
                    {/* 頂部標題 */}
                    <div className="bg-gradient-to-b from-amber-700/90 to-amber-900/90 p-4 md:p-5 flex justify-between items-center z-10 shadow-md backdrop-blur-md">
                        <div className="flex items-center gap-3">
                            <TrophyIcon className="text-amber-400" size={32} />
                            <span className="font-bold text-amber-50 text-xl md:text-3xl tracking-widest">論語大賽</span>
                        </div>
                        <div className="bg-amber-950/50 px-5 py-2 rounded-full text-amber-200 font-mono font-bold flex items-center gap-2 border border-amber-800/50 text-lg md:text-xl">
                            <StarIcon size={24} className="text-yellow-400 fill-current" />
                            答對: {correctAnswers} 題
                        </div>
                    </div>

                    {/* 賽道區域 */}
                    <div className="flex-[3] bg-white/5 flex flex-col py-4 px-2 md:px-6 gap-3 relative overflow-hidden">
                        {/* 終點線 */}
                        <div className="absolute right-0 sm:right-6 md:right-8 top-0 bottom-0 w-12 border-l-8 border-dashed border-red-500/50 bg-red-500/10 z-0 flex flex-col justify-center items-center">
                            <span className="rotate-90 font-black text-red-500/50 tracking-[0.5em] text-3xl opacity-50">FINISH</span>
                        </div>

                        {[
                            { id: 'player', name: '我 (玩家)', pos: positions.player, avatar: '🎓', color: 'bg-green-500' },
                            { id: 'cpu1', name: CPU_NAMES[0], pos: positions.cpu1, avatar: '🐎', color: 'bg-purple-500' },
                            { id: 'cpu2', name: CPU_NAMES[1], pos: positions.cpu2, avatar: '🐎', color: 'bg-blue-500' },
                            { id: 'cpu3', name: CPU_NAMES[2], pos: positions.cpu3, avatar: '🐎', color: 'bg-orange-500' },
                        ].map((racer, idx) => (
                            <div key={racer.id} className="flex-1 relative flex items-center bg-white/10 rounded-2xl border border-white/5 backdrop-blur-md z-10 px-4 md:px-8">
                                <div className="absolute left-0 right-0 h-2 bg-white/20 top-1/2 -translate-y-1/2 rounded-full mx-8 md:mx-16"></div>
                                <div className="absolute right-4 md:right-8 w-12 h-12 md:w-16 md:h-16 bg-amber-500/80 rounded-xl flex items-center justify-center shadow-lg border-4 border-amber-300/50 z-0">
                                    <span className="text-white font-bold text-xl md:text-2xl">{idx + 1}</span>
                                </div>
                                <div 
                                    className="absolute flex flex-col items-center transition-all duration-[500ms] ease-linear z-10"
                                    style={{ left: `calc(${racer.pos * 0.82}% + 20px)` }}
                                >
                                    <div className={`w-14 h-14 md:w-20 md:h-20 ${racer.color} rounded-full border-4 md:border-[6px] border-white shadow-2xl flex items-center justify-center text-3xl md:text-4xl transform -translate-y-3 md:-translate-y-4`}>
                                        {racer.avatar}
                                    </div>
                                    <div className="bg-slate-900/90 text-white text-sm md:text-lg px-4 py-1 rounded-full mt-1 md:mt-2 whitespace-nowrap font-bold shadow-md">
                                        {racer.name}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 下半部：問答區域 */}
                    {gameState === 'playing' && (
                    <div className="flex-[2] bg-slate-50/95 backdrop-blur-md shadow-[0_-15px_40px_rgba(0,0,0,0.4)] z-20 flex flex-col relative px-6 py-6 md:px-12 md:py-8">
                        <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-800 rounded-full px-6 py-2 flex items-center gap-3 border-4 border-slate-700 shadow-xl text-white text-xl md:text-2xl">
                            <TimerIcon size={28} className={timeLeft <= 5 ? 'text-red-400 animate-pulse' : 'text-blue-400'} />
                            <span className={`font-mono font-black ${timeLeft <= 5 ? 'text-red-400' : 'text-white'}`}>
                                {timeLeft}s
                            </span>
                        </div>
                        
                        <div className="flex-1 flex flex-col h-full justify-between">
                            <div className="flex-[1] flex items-center justify-center text-center px-4">
                                <h2 className="text-2xl md:text-4xl font-extrabold text-slate-800 leading-snug drop-shadow-sm">
                                    {questions[currentQIndex]?.q}
                                </h2>
                            </div>
                            
                            <div className="flex-[2] grid grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
                                {questions[currentQIndex]?.options.map((opt, idx) => {
                                    let btnColor = "bg-white hover:bg-blue-50 border-slate-200 text-slate-700 shadow-md";
                                    if (feedback) {
                                        if (idx === questions[currentQIndex].ans) btnColor = "bg-green-100 border-green-500 text-green-700 shadow-inner";
                                        else if (feedback === 'wrong') btnColor = "bg-red-50 border-red-200 text-red-400 opacity-50";
                                    }
                                    return (
                                        <button key={idx} onClick={() => handleAnswer(idx)} disabled={feedback !== null} className={`p-4 md:p-6 rounded-2xl border-4 font-bold transition-all active:scale-95 flex items-center justify-center text-xl md:text-3xl ${btnColor}`}>
                                            {opt}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="absolute bottom-0 left-0 right-0 h-2 bg-slate-300">
                            <div className="h-full bg-blue-500 transition-all duration-1000 ease-linear" style={{ width: `${(timeLeft / TIME_LIMIT) * 100}%` }} />
                        </div>
                    </div>
                    )}

                    {/* 結算畫面 */}
                    {gameState === 'finished' && (
                    <div className="absolute inset-0 bg-slate-900/90 z-50 flex flex-col items-center justify-center p-6 backdrop-blur-md">
                        <div className="bg-amber-50 w-full max-w-lg rounded-3xl p-10 text-center shadow-[0_0_50px_rgba(251,191,36,0.3)] animate-bounce-in border-4 border-amber-600 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-40 bg-amber-600 rounded-b-[50%] -translate-y-20"></div>
                            <div className="relative z-10 flex flex-col items-center mt-6">
                                {rank === 1 ? (
                                    <div className="w-32 h-32 bg-yellow-400 rounded-full flex items-center justify-center border-[6px] border-yellow-200 shadow-2xl mb-6">
                                        <TrophyIcon size={64} className="text-yellow-700" />
                                    </div>
                                ) : (
                                    <div className="w-32 h-32 bg-slate-300 rounded-full flex items-center justify-center border-[6px] border-slate-100 shadow-lg mb-6">
                                        <AlertCircleIcon size={64} className="text-slate-600" />
                                    </div>
                                )}
                                <h2 className="text-5xl font-black text-amber-900 mb-2">{rank === 1 ? '金榜題名！' : '再接再厲！'}</h2>
                                <p className="text-amber-700 font-extrabold text-3xl mb-8">最終名次：第 {rank} 名</p>
                                <button onClick={startGame} className="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-black py-5 rounded-2xl shadow-xl transform transition active:scale-95 flex items-center justify-center gap-3 text-2xl">
                                    <RotateCcwIcon size={28} /> 再來一局
                                </button>
                            </div>
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
